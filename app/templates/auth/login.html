<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — NF Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- Background -->
<div class="bg-grid"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<div class="auth-wrap">
  <div class="auth-card animate-in">

    <div class="auth-logo">
      <div class="auth-logo-icon">N</div>
      <h1>NF Manager</h1>
      <p>Premium Cookie Management System</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" name="remember" id="remember" style="accent-color:var(--red);width:16px;height:16px;cursor:pointer;">
        <label for="remember" style="font-size:13px;color:var(--text-muted);cursor:pointer;">Remember Me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="padding:13px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Login
      </button>
    </form>

    <div class="auth-divider"></div>
    <p style="text-align:center;font-size:13px;color:var(--text-muted);">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" style="color:var(--red);font-weight:700;text-decoration:none;">Register now</a>
    </p>
  </div>
</div>
</body>
</html>
